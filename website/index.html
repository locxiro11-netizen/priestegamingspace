<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PriesteGamingSpace</title>
  <meta name="description" content="PriesteGamingSpace — 游戏UI · 游戏截图 · 工作感悟">
  <meta name="theme-color" content="#F5F5F5">
  <meta property="og:title" content="PriesteGamingSpace">
  <meta property="og:description" content="游戏与生活的交集 · 分享不止于屏幕">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo" onclick="App.navigate('home')">
        <span class="logo-icon">◆</span>
        <span>PriesteGamingSpace</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色模式" id="theme-btn">🌙</button>
        <button class="bg-toggle" onclick="toggleBgPanel()" title="切换背景图" id="bg-btn">🖼️</button>
        <button class="bgm-btn" onclick="toggleBGM()" title="背景音乐" id="bgm-btn">🎵</button>
        <button class="header-signin" id="signin-btn">
          <span class="flame">🔥</span> 连续签到 <span class="streak">0</span> 天
        </button>
        <button class="cal-btn" onclick="App.handleExport()">📤</button>
        <button class="cal-btn" onclick="document.getElementById('import-file').click()">📥</button>
      </div>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Nav Tabs -->
  <div class="nav-bar">
    <div class="nav-tabs" id="nav-tabs"></div>
  </div>

  <!-- Sub Bar (date + filter + bookmarks) -->
  <div class="sub-bar" id="sub-bar"></div>

  <!-- Main Content -->
  <main class="main-content" id="content"></main>

  <!-- Footer -->
  <footer class="app-footer">
    <p>© 2026 PriesteGamingSpace · Hosted on <a href="https://pages.github.com" target="_blank" style="color:var(--accent-gold);text-decoration:none">GitHub Pages</a></p>
  </footer>

  <input type="file" id="import-file" accept=".json" style="display:none">

  <audio id="bgm-audio" loop preload="auto" style="display:none">
    <source src="assets/bgm.mp4" type="audio/mp4">
  </audio>

  <!-- Music HUD -->
  <div class="music-hud" id="music-hud">
    <div class="music-cover">🎵</div>
    <div class="music-info">
      <div class="music-title" id="music-title"><span>明日方舟：终末地 EP - 宜</span></div>
      <div class="music-artist">庄方宜</div>
    </div>
    <div class="music-progress-wrap">
      <span class="music-time" id="music-cur">0:00</span>
      <input type="range" class="music-progress" id="music-prog" min="0" max="100" value="0" oninput="seekBGM(this.value)">
      <span class="music-time" id="music-dur">0:00</span>
    </div>
    <div class="music-controls">
      <button class="music-ctrl-btn" onclick="toggleBGM()" id="hud-play">▶</button>
    </div>
  </div>

  <!-- Background Upload Panel -->
  <div class="bg-upload-overlay" id="bg-overlay" onclick="if(event.target===this)closeBgPanel()">
    <div class="bg-upload-panel" id="bg-panel" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h4 style="margin:0">🖼️ 背景图设置</h4>
        <button class="modal-close" onclick="closeBgPanel()" style="position:static">✕</button>
      </div>
      <div class="bg-upload-row" id="bg-presets">
        <button onclick="setBg('none')">无背景</button>
        <button onclick="setBg('custom')">星空</button>
        <button onclick="setBg('life')">自然</button>
      </div>
      <div class="bg-upload-custom">
        <input type="file" id="bg-upload-input" accept="image/*" onchange="uploadBg(this)">
        <label for="bg-upload-input">📁 上传自定义背景</label>
      </div>
      <div class="bg-zoom-row" style="margin-top:14px">
        <span style="font-size:var(--font-xs);color:var(--text-muted)">🔍 缩放</span>
        <input type="range" id="bg-zoom" min="50" max="200" value="100" oninput="setBgZoom(this.value)" style="flex:1;margin:0 8px;accent-color:var(--accent-gold)">
        <span style="font-size:var(--font-xs);color:var(--text-muted);min-width:36px" id="bg-zoom-val">100%</span>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function(){
      var t=localStorage.getItem('pgs_theme')||'light';
      document.documentElement.setAttribute('data-theme',t);
      var b=document.getElementById('theme-btn');
      if(b)b.textContent=t==='dark'?'☀️':'🌙';
    })();
    function toggleTheme(){
      var c=document.documentElement.getAttribute('data-theme');
      var n=c==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',n);
      localStorage.setItem('pgs_theme',n);
      var b=document.getElementById('theme-btn');
      if(b)b.textContent=n==='dark'?'☀️':'🌙';
    }
    var _bgs=['none','custom','life'];
    function setBg(name){
      localStorage.setItem('pgs_bg',name);
      applyBg(name);
      closeBgPanel();
      updateBgPresetBtns(name);
    }
    function applyBg(name){
      document.body.className='bg-'+name;
      var zoom=localStorage.getItem('pgs_bg_zoom')||100;
      document.body.style.backgroundSize=zoom+'%';
      if(name==='upload'){
        var d=localStorage.getItem('pgs_bg_upload');
        if(d)document.body.style.backgroundImage='url('+d+')';
      }else{document.body.style.backgroundImage='';}
      var b=document.getElementById('bg-btn');
      var labels={'none':'🖼️','custom':'🖼️✨','life':'🖼️🌿','upload':'🖼️📁'};
      if(b)b.textContent=labels[name]||'🖼️';
      var s=document.getElementById('bg-zoom');
      var v=document.getElementById('bg-zoom-val');
      if(s)s.value=zoom;
      if(v)v.textContent=zoom+'%';
    }
    function setBgZoom(val){
      localStorage.setItem('pgs_bg_zoom',val);
      document.body.style.backgroundSize=val+'%';
      var v=document.getElementById('bg-zoom-val');
      if(v)v.textContent=val+'%';
    }
    function updateBgPresetBtns(active){
      var btns=document.querySelectorAll('#bg-presets button');
      btns.forEach(function(btn){
        btn.classList.toggle('active',btn.textContent.trim()===getBgLabel(active));
      });
    }
    function getBgLabel(name){
      return name==='none'?'无背景':name==='custom'?'星空':name==='life'?'自然':'';
    }
    function toggleBgPanel(){
      document.getElementById('bg-overlay').classList.toggle('show');
      updateBgPresetBtns(localStorage.getItem('pgs_bg')||'none');
    }
    function closeBgPanel(){
      document.getElementById('bg-overlay').classList.remove('show');
    }
    function uploadBg(input){
      var f=input.files[0];
      if(!f)return;
      if(f.size>20*1024*1024){alert('图片不能超过20MB');return;}
      var r=new FileReader();
      r.onload=function(e){
        localStorage.setItem('pgs_bg_upload',e.target.result);
        setBg('upload');
      };
      r.readAsDataURL(f);
      input.value='';
    }
    (function(){
      var bg=localStorage.getItem('pgs_bg')||'none';
      applyBg(bg);
    })();

    // BGM
    function toggleBGM(){
      var a=document.getElementById('bgm-audio');
      if(a.paused){playBGM();}else{pauseBGM();}
    }
    function playBGM(){
      var a=document.getElementById('bgm-audio');
      var b=document.getElementById('bgm-btn');
      var hud=document.getElementById('music-hud');
      var pb=document.getElementById('hud-play');
      a.play().then(function(){
        if(b){b.classList.add('playing');b.textContent='🎵♪';}
        if(hud)hud.classList.add('show');
        if(pb)pb.textContent='⏸';
        localStorage.setItem('pgs_bgm','on');
        startProgress();
      }).catch(function(){});
    }
    function pauseBGM(){
      var a=document.getElementById('bgm-audio');
      var b=document.getElementById('bgm-btn');
      var pb=document.getElementById('hud-play');
      a.pause();
      if(b){b.classList.remove('playing');b.textContent='🎵';}
      if(pb)pb.textContent='▶';
      localStorage.setItem('pgs_bgm','off');
      stopProgress();
    }
    function formatTime(s){
      var m=Math.floor(s/60),sec=Math.floor(s%60);
      return m+':'+(sec<10?'0':'')+sec;
    }
    var _progTimer=null;
    function startProgress(){
      var a=document.getElementById('bgm-audio');
      var prog=document.getElementById('music-prog');
      var cur=document.getElementById('music-cur');
      var dur=document.getElementById('music-dur');
      if(!a||!prog)return;
      stopProgress();
      if(a.duration&&isFinite(a.duration))prog.max=Math.floor(a.duration);
      if(dur)dur.textContent=formatTime(a.duration||0);
      function tick(){
        var pct=a.duration?(a.currentTime/a.duration*100):0;
        if(prog)prog.value=Math.floor(a.currentTime);
        if(cur)cur.textContent=formatTime(a.currentTime);
        if(a.paused){stopProgress();return;}
        _progTimer=requestAnimationFrame(tick);
      }
      tick();
    }
    function stopProgress(){
      if(_progTimer){cancelAnimationFrame(_progTimer);_progTimer=null;}
    }
    function seekBGM(val){
      var a=document.getElementById('bgm-audio');
      if(a&&a.duration)a.currentTime=parseInt(val);
    }
    // Title marquee
    (function(){
      var t=document.getElementById('music-title');
      if(t&&t.scrollWidth>t.clientWidth){t.classList.add('scroll');
        t.querySelector('span').innerHTML+=('　　'+t.querySelector('span').innerHTML);}
    })();
    (function(){
      var a=document.getElementById('bgm-audio');
      a.volume=0.3;
      if(localStorage.getItem('pgs_bgm')!=='off'){
        document.addEventListener('click',function once(){
          playBGM();
        },{once:true});
      }
      // Progress
      a.addEventListener('loadedmetadata',function(){
        var prog=document.getElementById('music-prog');
        var dur=document.getElementById('music-dur');
        if(prog&&a.duration)prog.max=Math.floor(a.duration);
        if(dur)dur.textContent=formatTime(a.duration);
      });
      a.addEventListener('ended',function(){
        var pb=document.getElementById('hud-play');
        if(pb)pb.textContent='▶';
      });
    })();
  </script>
</body>
</html>
